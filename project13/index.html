<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="editor-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-section">
                <label for="file-input" class="btn btn-primary">
                    <span>📁 上传图片</span>
                </label>
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>
            
            <div class="toolbar-section">
                <button id="undo-btn" class="btn" disabled>↶ 撤销</button>
                <button id="redo-btn" class="btn" disabled>↷ 重做</button>
                <button id="reset-btn" class="btn" disabled>🔄 重置</button>
            </div>
            
            <div class="toolbar-section">
                <button id="export-btn" class="btn btn-success" disabled>💾 导出</button>
            </div>
        </div>
        
        <!-- 主要内容区 -->
        <div class="main-content">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <div class="control-group">
                    <h3>基础操作</h3>
                    <div class="control-buttons">
                        <button id="rotate-left-btn" class="btn btn-icon">↺</button>
                        <button id="rotate-right-btn" class="btn btn-icon">↻</button>
                        <button id="flip-h-btn" class="btn btn-icon">⇆</button>
                        <button id="flip-v-btn" class="btn btn-icon">⇅</button>
                    </div>
                </div>
                
                <div class="control-group">
                    <h3>裁剪</h3>
                    <div class="crop-controls">
                        <label>
                            <input type="radio" name="crop-ratio" value="free" checked> 自由比例
                        </label>
                        <label>
                            <input type="radio" name="crop-ratio" value="1:1"> 1:1
                        </label>
                        <label>
                            <input type="radio" name="crop-ratio" value="4:3"> 4:3
                        </label>
                        <label>
                            <input type="radio" name="crop-ratio" value="16:9"> 16:9
                        </label>
                        <label>
                            <input type="radio" name="crop-ratio" value="3:2"> 3:2
                        </label>
                    </div>
                    <button id="start-crop-btn" class="btn">开始裁剪</button>
                    <button id="apply-crop-btn" class="btn btn-primary" style="display: none;">应用裁剪</button>
                    <button id="cancel-crop-btn" class="btn" style="display: none;">取消裁剪</button>
                </div>
                
                <div class="control-group">
                    <h3>调整</h3>
                    <div class="slider-control">
                        <label for="brightness-slider">亮度: <span id="brightness-value">0</span></label>
                        <input type="range" id="brightness-slider" min="-100" max="100" value="0" step="1">
                    </div>
                    <div class="slider-control">
                        <label for="contrast-slider">对比度: <span id="contrast-value">0</span></label>
                        <input type="range" id="contrast-slider" min="-100" max="100" value="0" step="1">
                    </div>
                    <div class="slider-control">
                        <label for="saturation-slider">饱和度: <span id="saturation-value">0</span></label>
                        <input type="range" id="saturation-slider" min="-100" max="100" value="0" step="1">
                    </div>
                    <button id="apply-adjustments-btn" class="btn btn-primary">应用调整</button>
                    <button id="reset-adjustments-btn" class="btn">重置调整</button>
                </div>
                
                <div class="control-group">
                    <h3>文字水印</h3>
                    <div class="watermark-controls">
                        <div class="form-control">
                            <label for="watermark-text">文字内容:</label>
                            <input type="text" id="watermark-text" value="水印文字">
                        </div>
                        <div class="form-control">
                            <label for="watermark-font-size">字体大小:</label>
                            <input type="number" id="watermark-font-size" value="24" min="8" max="100">
                        </div>
                        <div class="form-control">
                            <label for="watermark-color">文字颜色:</label>
                            <input type="color" id="watermark-color" value="#ffffff">
                        </div>
                        <div class="form-control">
                            <label for="watermark-opacity">透明度: <span id="watermark-opacity-value">0.7</span></label>
                            <input type="range" id="watermark-opacity" min="0" max="1" step="0.1" value="0.7">
                        </div>
                        <div class="form-control">
                            <label for="watermark-position">位置:</label>
                            <select id="watermark-position">
                                <option value="top-left">左上</option>
                                <option value="top-center">中上</option>
                                <option value="top-right">右上</option>
                                <option value="center-left">左中</option>
                                <option value="center">居中</option>
                                <option value="center-right">右中</option>
                                <option value="bottom-left">左下</option>
                                <option value="bottom-center">中下</option>
                                <option value="bottom-right">右下</option>
                            </select>
                        </div>
                    </div>
                    <button id="add-watermark-btn" class="btn btn-primary">添加水印</button>
                </div>
                
                <div class="control-group">
                    <h3>马赛克</h3>
                    <div class="mosaic-controls">
                        <div class="form-control">
                            <label for="mosaic-size">块大小: <span id="mosaic-size-value">10</span></label>
                            <input type="range" id="mosaic-size" min="5" max="50" value="10" step="1">
                        </div>
                        <div class="form-control">
                            <label for="mosaic-brush-size">画笔大小: <span id="mosaic-brush-size-value">30</span></label>
                            <input type="range" id="mosaic-brush-size" min="10" max="100" value="30" step="5">
                        </div>
                    </div>
                    <button id="start-mosaic-btn" class="btn">开始涂抹</button>
                    <button id="stop-mosaic-btn" class="btn btn-primary" style="display: none;">完成涂抹</button>
                </div>
            </div>
            
            <!-- 画布区域 -->
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="main-canvas"></canvas>
                    <canvas id="preview-canvas" style="display: none;"></canvas>
                    <div id="crop-overlay" style="display: none;">
                        <div class="crop-box" id="crop-box">
                            <div class="crop-handle" data-handle="nw"></div>
                            <div class="crop-handle" data-handle="n"></div>
                            <div class="crop-handle" data-handle="ne"></div>
                            <div class="crop-handle" data-handle="e"></div>
                            <div class="crop-handle" data-handle="se"></div>
                            <div class="crop-handle" data-handle="s"></div>
                            <div class="crop-handle" data-handle="sw"></div>
                            <div class="crop-handle" data-handle="w"></div>
                        </div>
                    </div>
                </div>
                <div id="placeholder" class="placeholder">
                    <div class="placeholder-content">
                        <span class="placeholder-icon">📷</span>
                        <p>点击上方"上传图片"按钮开始编辑</p>
                        <p class="placeholder-hint">支持 JPG、PNG、GIF、WebP 等格式</p>
                    </div>
                </div>
            </div>
            
            <!-- 导出设置面板 -->
            <div id="export-panel" class="export-panel" style="display: none;">
                <div class="panel-header">
                    <h3>导出设置</h3>
                    <button id="close-export-btn" class="btn-close">&times;</button>
                </div>
                <div class="panel-content">
                    <div class="form-control">
                        <label for="export-format">格式:</label>
                        <select id="export-format">
                            <option value="image/png">PNG (无损)</option>
                            <option value="image/jpeg">JPEG (有损)</option>
                        </select>
                    </div>
                    <div class="form-control" id="quality-control">
                        <label for="export-quality">质量: <span id="quality-value">0.9</span></label>
                        <input type="range" id="export-quality" min="0.1" max="1" step="0.1" value="0.9">
                    </div>
                    <div class="form-control">
                        <label for="export-filename">文件名:</label>
                        <input type="text" id="export-filename" value="edited-image">
                    </div>
                </div>
                <div class="panel-footer">
                    <button id="confirm-export-btn" class="btn btn-success">确认导出</button>
                    <button id="cancel-export-btn" class="btn">取消</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
