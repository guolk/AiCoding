<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线乐谱编辑器</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="toolbar">
            <div class="toolbar-left">
                <h1>🎵 在线乐谱编辑器</h1>
            </div>
            <div class="toolbar-right">
                <button id="newBtn" class="btn btn-primary">新建</button>
                <button id="saveBtn" class="btn btn-success">保存</button>
                <button id="loadBtn" class="btn btn-info">加载</button>
                <button id="exportBtn" class="btn btn-warning">导出PNG</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="control-panel">
                <div class="panel-section">
                    <h3>时值选择</h3>
                    <div class="duration-controls">
                        <button class="duration-btn active" data-duration="w">𝅝 全音符</button>
                        <button class="duration-btn" data-duration="h">𝅗𝅥 二分音符</button>
                        <button class="duration-btn" data-duration="q">♩ 四分音符</button>
                        <button class="duration-btn" data-duration="8">♪ 八分音符</button>
                        <button class="duration-btn" data-duration="16">♬ 十六分音符</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>音符类型</h3>
                    <div class="type-controls">
                        <button class="type-btn active" data-type="note">音符</button>
                        <button class="type-btn" data-type="rest">休止符</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>升降号</h3>
                    <div class="accidental-controls">
                        <button class="accidental-btn" data-accidental="sharp">♯ 升号</button>
                        <button class="accidental-btn" data-accidental="flat">♭ 降号</button>
                        <button class="accidental-btn active" data-accidental="natural">♮ 还原</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>连音线</h3>
                    <div class="tie-controls">
                        <button class="tie-btn" data-tie="start">开始连音</button>
                        <button class="tie-btn" data-tie="end">结束连音</button>
                        <button class="tie-btn active" data-tie="none">无连音</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>播放控制</h3>
                    <div class="playback-controls">
                        <button id="playBtn" class="play-btn">▶ 播放</button>
                        <button id="stopBtn" class="stop-btn">⏹ 停止</button>
                    </div>
                    <div class="tempo-control">
                        <label for="tempoSlider">速度: <span id="tempoValue">120</span> BPM</label>
                        <input type="range" id="tempoSlider" min="40" max="200" value="120">
                    </div>
                    <div class="instrument-control">
                        <label for="instrumentSelect">音色:</label>
                        <select id="instrumentSelect">
                            <option value="piano">钢琴</option>
                            <option value="synth">合成器</option>
                            <option value="amSynth">AM合成器</option>
                            <option value="fmSynth">FM合成器</option>
                        </select>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>轨道控制 (最多4轨道)</h3>
                    <div class="track-controls">
                        <div class="track-header">
                            <span>轨道</span>
                            <span>音量</span>
                            <span>静音</span>
                        </div>
                        <div id="trackList" class="track-list">
                        </div>
                        <button id="addTrackBtn" class="btn btn-small">+ 添加轨道</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>编辑工具</h3>
                    <div class="edit-controls">
                        <button id="deleteBtn" class="btn btn-danger">删除选中</button>
                        <button id="clearBtn" class="btn btn-danger">清空所有</button>
                        <button id="undoBtn" class="btn">撤销</button>
                        <button id="redoBtn" class="btn">重做</button>
                    </div>
                </div>
            </aside>

            <main class="editor-area">
                <div class="score-header">
                    <input type="text" id="scoreTitle" placeholder="乐谱标题" value="我的乐谱">
                    <div class="key-signature">
                        <label>调号:</label>
                        <select id="keySignature">
                            <option value="C">C 大调</option>
                            <option value="G">G 大调</option>
                            <option value="D">D 大调</option>
                            <option value="F">F 大调</option>
                            <option value="Bb">Bb 大调</option>
                            <option value="Am">A 小调</option>
                            <option value="Em">E 小调</option>
                        </select>
                    </div>
                    <div class="time-signature">
                        <label>拍号:</label>
                        <select id="timeSignature">
                            <option value="4/4">4/4</option>
                            <option value="3/4">3/4</option>
                            <option value="2/4">2/4</option>
                            <option value="6/8">6/8</option>
                        </select>
                    </div>
                </div>
                
                <div class="score-container" id="scoreContainer">
                    <div class="score-canvas-wrapper">
                        <canvas id="scoreCanvas"></canvas>
                        <div id="clickOverlay" class="click-overlay"></div>
                    </div>
                </div>

                <div class="score-footer">
                    <div class="status-bar">
                        <span id="cursorPosition">位置: 小节 1, 位置 0</span>
                        <span id="selectedNote">选中: 无</span>
                        <span id="trackInfo">当前轨道: 1</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="loadModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>加载乐谱</h2>
            <div id="scoreList" class="score-list">
                <p>暂无保存的乐谱</p>
            </div>
        </div>
    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>保存乐谱</h2>
            <div class="form-group">
                <label for="saveTitle">乐谱标题:</label>
                <input type="text" id="saveTitle" placeholder="输入乐谱标题">
            </div>
            <button id="confirmSaveBtn" class="btn btn-success">确认保存</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/score-model.js"></script>
    <script src="js/vexflow-renderer.js"></script>
    <script src="js/tone-player.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
