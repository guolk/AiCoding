<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单物理沙盒游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .element-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .element-btn:hover {
            transform: translateY(-2px);
        }
        
        .element-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .sand { background: #e6c229; color: #333; }
        .water { background: #3498db; color: #fff; }
        .fire { background: #e74c3c; color: #fff; }
        .stone { background: #7f8c8d; color: #fff; }
        .wood { background: #8b4513; color: #fff; }
        .tnt { background: #f39c12; color: #333; }
        .eraser { background: #9b59b6; color: #fff; }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background: #34495e;
            color: #fff;
        }
        
        .action-btn:hover {
            background: #2c3e50;
        }
        
        .action-btn.playing {
            background: #27ae60;
        }
        
        canvas {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            background: #000;
            cursor: crosshair;
        }
        
        .info {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }
        
        #debug {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-width: 600px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>物理沙盒游戏</h1>
    
    <div id="debug">
        初始化中...
    </div>
    
    <div class="controls">
        <button class="element-btn sand active" data-element="sand" onclick="selectElement('sand', this)">沙子</button>
        <button class="element-btn water" data-element="water" onclick="selectElement('water', this)">水</button>
        <button class="element-btn fire" data-element="fire" onclick="selectElement('fire', this)">火</button>
        <button class="element-btn stone" data-element="stone" onclick="selectElement('stone', this)">石头</button>
        <button class="element-btn wood" data-element="wood" onclick="selectElement('wood', this)">木头</button>
        <button class="element-btn tnt" data-element="tnt" onclick="selectElement('tnt', this)">炸药</button>
        <button class="element-btn eraser" data-element="eraser" onclick="selectElement('eraser', this)">橡皮擦</button>
        
        <button class="action-btn playing" id="playPause" onclick="togglePause()">暂停</button>
        <button class="action-btn" onclick="clearCanvas()">清空</button>
    </div>
    
    <canvas id="canvas" width="600" height="400"></canvas>
    
    <div class="info">
        <p>使用鼠标左键在画布上绘制元素，右键或使用橡皮擦删除元素</p>
    </div>

    <script>
        var debugDiv = document.getElementById('debug');
        var debugMessages = [];
        
        function debug(msg) {
            console.log(msg);
            debugMessages.push(msg);
            if (debugMessages.length > 10) {
                debugMessages.shift();
            }
            if (debugDiv) {
                debugDiv.innerHTML = debugMessages.join('<br>');
            }
        }
        
        debug('脚本开始执行...');
        
        var canvas, ctx;
        var cellSize = 4;
        var width = 600;
        var height = 400;
        var cols = Math.floor(width / cellSize);
        var rows = Math.floor(height / cellSize);
        
        var grid = [];
        var updated = [];
        
        var selectedElement = 'sand';
        var isPlaying = true;
        var brushSize = 5;
        var isMouseDown = false;
        var isRightMouseDown = false;
        var mouseX = 0;
        var mouseY = 0;
        
        var elements = {
            empty: { color: '#000000' },
            sand: { color: '#e6c229' },
            water: { color: '#3498db' },
            fire: { color: '#e74c3c', life: 50 },
            stone: { color: '#7f8c8d' },
            wood: { color: '#8b4513' },
            tnt: { color: '#f39c12' },
            eraser: { color: '#9b59b6' }
        };
        
        function selectElement(element, btn) {
            debug('选中元素: ' + element);
            selectedElement = element;
            
            var buttons = document.querySelectorAll('.element-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btn.classList.add('active');
        }
        
        function togglePause() {
            isPlaying = !isPlaying;
            var btn = document.getElementById('playPause');
            if (isPlaying) {
                btn.textContent = '暂停';
                btn.classList.add('playing');
            } else {
                btn.textContent = '继续';
                btn.classList.remove('playing');
            }
            debug('游戏状态: ' + (isPlaying ? '运行中' : '已暂停'));
        }
        
        function clearCanvas() {
            debug('清空画布');
            createGrid();
        }
        
        function createGrid() {
            grid = [];
            updated = [];
            
            for (var i = 0; i < rows; i++) {
                grid[i] = [];
                updated[i] = [];
                for (var j = 0; j < cols; j++) {
                    grid[i][j] = {
                        type: 'empty',
                        color: elements.empty.color,
                        life: 0
                    };
                    updated[i][j] = false;
                }
            }
            debug('网格创建完成: ' + rows + '行 x ' + cols + '列');
        }
        
        function setCell(x, y, type) {
            if (x < 0 || x >= cols || y < 0 || y >= rows) return;
            
            var element = elements[type] || elements.empty;
            grid[y][x] = {
                type: type,
                color: element.color,
                life: element.life || 0
            };
            updated[y][x] = true;
        }
        
        function isEmpty(x, y) {
            if (x < 0 || x >= cols || y < 0 || y >= rows) {
                return false;
            }
            return grid[y][x].type === 'empty';
        }
        
        function getCell(x, y) {
            if (x < 0 || x >= cols || y < 0 || y >= rows) {
                return null;
            }
            return grid[y][x];
        }
        
        function swapCells(x1, y1, x2, y2) {
            var temp = grid[y1][x1];
            grid[y1][x1] = grid[y2][x2];
            grid[y2][x2] = temp;
            
            updated[y1][x1] = true;
            updated[y2][x2] = true;
        }
        
        function updateSand(x, y) {
            if (isEmpty(x, y + 1)) {
                swapCells(x, y, x, y + 1);
                return;
            }
            
            var below = getCell(x, y + 1);
            if (below && below.type === 'water') {
                swapCells(x, y, x, y + 1);
                return;
            }
            
            var dir = Math.random() < 0.5 ? -1 : 1;
            if (isEmpty(x + dir, y + 1)) {
                swapCells(x, y, x + dir, y + 1);
            } else if (isEmpty(x - dir, y + 1)) {
                swapCells(x, y, x - dir, y + 1);
            }
        }
        
        function updateWater(x, y) {
            if (isEmpty(x, y + 1)) {
                swapCells(x, y, x, y + 1);
                return;
            }
            
            var dir = Math.random() < 0.5 ? -1 : 1;
            if (isEmpty(x + dir, y + 1)) {
                swapCells(x, y, x + dir, y + 1);
            } else if (isEmpty(x - dir, y + 1)) {
                swapCells(x, y, x - dir, y + 1);
            } else {
                if (isEmpty(x + dir, y)) {
                    swapCells(x, y, x + dir, y);
                } else if (isEmpty(x - dir, y)) {
                    swapCells(x, y, x - dir, y);
                }
            }
        }
        
        function updateFire(x, y) {
            var cell = grid[y][x];
            cell.life--;
            
            if (cell.life <= 0) {
                setCell(x, y, 'empty');
                return;
            }
            
            var variation = Math.floor(Math.random() * 100);
            if (variation < 30) {
                cell.color = '#ff6b35';
            } else if (variation < 60) {
                cell.color = '#ffd700';
            } else {
                cell.color = '#e74c3c';
            }
            
            var neighbors = [
                { dx: 0, dy: -1 },
                { dx: 1, dy: 0 },
                { dx: -1, dy: 0 },
                { dx: 0, dy: 1 }
            ];
            
            for (var i = 0; i < neighbors.length; i++) {
                var neighbor = neighbors[i];
                var nx = x + neighbor.dx;
                var ny = y + neighbor.dy;
                var neighborCell = getCell(nx, ny);
                
                if (neighborCell) {
                    if (neighborCell.type === 'wood' && Math.random() < 0.05) {
                        setCell(nx, ny, 'fire');
                    } else if (neighborCell.type === 'tnt' && Math.random() < 0.1) {
                        explode(nx, ny);
                    } else if (neighborCell.type === 'water') {
                        setCell(x, y, 'empty');
                        if (Math.random() < 0.3) {
                            setCell(nx, ny, 'empty');
                        }
                        return;
                    }
                }
            }
            
            if (isEmpty(x, y - 1) && Math.random() < 0.3) {
                swapCells(x, y, x, y - 1);
            }
        }
        
        function explode(x, y) {
            var radius = 6;
            
            for (var dy = -radius; dy <= radius; dy++) {
                for (var dx = -radius; dx <= radius; dx++) {
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist <= radius) {
                        var nx = x + dx;
                        var ny = y + dy;
                        
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            var cell = getCell(nx, ny);
                            
                            if (cell && cell.type === 'stone') {
                                continue;
                            }
                            
                            if (dist < radius * 0.7) {
                                if (Math.random() < 0.7) {
                                    setCell(nx, ny, 'empty');
                                }
                            } else {
                                if (Math.random() < 0.3) {
                                    setCell(nx, ny, 'fire');
                                } else if (Math.random() < 0.5) {
                                    setCell(nx, ny, 'empty');
                                }
                            }
                        }
                    }
                }
            }
        }
        
        function updateCell(x, y) {
            if (updated[y][x]) return;
            
            var cell = grid[y][x];
            if (cell.type === 'empty') return;
            
            updated[y][x] = true;
            
            switch (cell.type) {
                case 'sand':
                    updateSand(x, y);
                    break;
                case 'water':
                    updateWater(x, y);
                    break;
                case 'fire':
                    updateFire(x, y);
                    break;
                case 'wood':
                case 'stone':
                case 'tnt':
                    break;
            }
        }
        
        function update() {
            if (!isPlaying) return;
            
            for (var i = 0; i < rows; i++) {
                for (var j = 0; j < cols; j++) {
                    updated[i][j] = false;
                }
            }
            
            var leftToRight = Math.random() < 0.5;
            
            for (var y = rows - 1; y >= 0; y--) {
                if (leftToRight) {
                    for (var x = 0; x < cols; x++) {
                        updateCell(x, y);
                    }
                } else {
                    for (var x = cols - 1; x >= 0; x--) {
                        updateCell(x, y);
                    }
                }
            }
        }
        
        function render() {
            ctx.clearRect(0, 0, width, height);
            
            for (var y = 0; y < rows; y++) {
                for (var x = 0; x < cols; x++) {
                    var cell = grid[y][x];
                    if (cell.type !== 'empty') {
                        ctx.fillStyle = cell.color;
                        ctx.fillRect(
                            x * cellSize,
                            y * cellSize,
                            cellSize,
                            cellSize
                        );
                    }
                }
            }
        }
        
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        function updateMousePosition(e) {
            var rect = canvas.getBoundingClientRect();
            mouseX = Math.floor((e.clientX - rect.left) / cellSize);
            mouseY = Math.floor((e.clientY - rect.top) / cellSize);
        }
        
        function placeElements() {
            var element = isRightMouseDown ? 'empty' : selectedElement;
            
            for (var dy = -brushSize + 1; dy < brushSize; dy++) {
                for (var dx = -brushSize + 1; dx < brushSize; dx++) {
                    if (dx * dx + dy * dy < brushSize * brushSize) {
                        var x = mouseX + dx;
                        var y = mouseY + dy;
                        
                        if (x >= 0 && x < cols && y >= 0 && y < rows) {
                            if (element === 'empty') {
                                setCell(x, y, 'empty');
                            } else if (grid[y][x].type === 'empty') {
                                setCell(x, y, element);
                            }
                        }
                    }
                }
            }
        }
        
        function init() {
            debug('开始初始化...');
            
            try {
                canvas = document.getElementById('canvas');
                if (!canvas) {
                    debug('错误：找不到canvas元素！');
                    alert('错误：找不到canvas元素！');
                    return;
                }
                debug('找到canvas元素');
                
                ctx = canvas.getContext('2d');
                if (!ctx) {
                    debug('错误：无法获取canvas上下文！');
                    alert('错误：无法获取canvas上下文！');
                    return;
                }
                debug('获取到canvas上下文');
                
                createGrid();
                
                canvas.addEventListener('mousedown', function(e) {
                    debug('鼠标按下，按钮: ' + e.button);
                    if (e.button === 0) {
                        isMouseDown = true;
                    } else if (e.button === 2) {
                        isRightMouseDown = true;
                    }
                    updateMousePosition(e);
                    placeElements();
                });
                
                canvas.addEventListener('mouseup', function(e) {
                    if (e.button === 0) {
                        isMouseDown = false;
                    } else if (e.button === 2) {
                        isRightMouseDown = false;
                    }
                });
                
                canvas.addEventListener('mousemove', function(e) {
                    updateMousePosition(e);
                    if (isMouseDown || isRightMouseDown) {
                        placeElements();
                    }
                });
                
                canvas.addEventListener('mouseleave', function() {
                    isMouseDown = false;
                    isRightMouseDown = false;
                });
                
                canvas.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                });
                
                debug('事件绑定完成');
                
                gameLoop();
                
                debug('初始化完成！游戏开始运行');
                
            } catch (error) {
                debug('初始化错误: ' + error.message);
                alert('初始化失败: ' + error.message);
            }
        }
        
        debug('DOM准备状态: ' + document.readyState);
        
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            debug('DOM已加载，立即初始化');
            setTimeout(init, 10);
        } else {
            debug('等待DOMContentLoaded事件');
            document.addEventListener('DOMContentLoaded', init);
        }
        
        window.addEventListener('load', function() {
            debug('window load事件触发');
            if (!canvas) {
                debug('游戏还未初始化，现在初始化...');
                init();
            }
        });
    </script>
</body>
</html>
